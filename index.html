<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JamZia™ — The Everything App</title>
  <style>
    :root {
      --navy: #081F5C;
      --blue: #7096D1;
      --ice: #D0E3FF;
      --warm: #F7F2EB;
      --black: #000000;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: var(--black);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      line-height: 1.6;
      min-height: 100vh;
    }
    
    /* Header */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      background: var(--navy);
    }
    
    .header-content {
      height: 70px;
      padding: 0 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .logo {
      font-size: 1.5rem;
      font-weight: 800;
      color: white;
      letter-spacing: -0.5px;
    }
    
    .logo span {
      color: var(--warm);
    }
    
    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    
    .tagline {
      display: none;
    }
    
    @media (min-width: 640px) {
      .tagline {
        display: inline;
        color: var(--blue);
        font-size: 0.875rem;
      }
    }
    
    .globe-icon {
      width: 20px;
      height: 20px;
      color: var(--blue);
    }
    
    .header-border {
      height: 1px;
      background: rgba(112, 150, 209, 0.3);
    }
    
    /* Main Content */
    main {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 70px 24px 0;
      position: relative;
      overflow: hidden;
    }
    
    .bg-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(8, 31, 92, 0.2), var(--black), var(--black));
      pointer-events: none;
    }
    
    .bg-glow {
      position: absolute;
      top: 33%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: rgba(112, 150, 209, 0.1);
      border-radius: 50%;
      filter: blur(150px);
      pointer-events: none;
    }
    
    .content {
      position: relative;
      z-index: 10;
      text-align: center;
      max-width: 800px;
    }
    
    /* Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      background: rgba(112, 150, 209, 0.2);
      border: 1px solid var(--blue);
      border-radius: 9999px;
      color: var(--ice);
      font-size: 0.875rem;
      margin-bottom: 32px;
    }
    
    .badge svg {
      width: 16px;
      height: 16px;
    }
    
    /* Title */
    h1 {
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 24px;
    }
    
    h1 .white {
      color: white;
    }
    
    h1 .warm {
      color: var(--warm);
    }
    
    /* Subtitle */
    .subtitle {
      font-size: clamp(1.1rem, 2.5vw, 1.5rem);
      color: var(--ice);
      font-weight: 300;
      letter-spacing: 0.025em;
      margin-bottom: 16px;
    }
    
    .description {
      font-size: 1.125rem;
      color: rgba(255, 255, 255, 0.6);
      max-width: 500px;
      margin: 0 auto 48px;
      line-height: 1.6;
    }
    
    /* CTA Button */
    .cta-button {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 20px 40px;
      background: #DC2626;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.125rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
    }
    
    .cta-button:hover {
      background: #B91C1C;
      transform: scale(1.05);
      box-shadow: 0 0 40px rgba(220, 38, 38, 0.4);
    }
    
    .cta-button svg {
      width: 20px;
      height: 20px;
      transition: transform 0.3s ease;
    }
    
    .cta-button:hover svg {
      transform: translateX(4px);
    }
    
    /* Stats */
    .stats {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-top: 64px;
    }
    
    @media (min-width: 640px) {
      .stats {
        gap: 64px;
      }
    }
    
    .stat {
      text-align: center;
    }
    
    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--warm);
    }
    
    @media (min-width: 640px) {
      .stat-value {
        font-size: 2rem;
      }
    }
    
    .stat-label {
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 4px;
    }
    
    .stat-divider {
      width: 1px;
      background: rgba(112, 150, 209, 0.3);
    }
    
    /* Footer */
    .footer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 24px;
    }
    
    .footer-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      font-size: 0.875rem;
      color: rgba(255, 255, 255, 0.4);
    }
    
    @media (min-width: 640px) {
      .footer-content {
        flex-direction: row;
        justify-content: space-between;
      }
    }
    
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <div class="header-content">
      <div class="logo">JamZia<span>™</span></div>
      <div class="header-right">
        <span class="tagline">The Everything App</span>
        <svg class="globe-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"></path>
          <path d="M2 12h20"></path>
        </svg>
      </div>
    </div>
    <div class="header-border"></div>
  </header>

  <!-- Main -->
  <main>
    <div class="bg-gradient"></div>
    <div class="bg-glow"></div>
    
    <div class="content">
      <!-- Badge -->
      <div class="badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"></path>
          <path d="M20 3v4"></path>
          <path d="M22 5h-4"></path>
          <path d="M4 17v2"></path>
          <path d="M5 18H3"></path>
        </svg>
        Now Streaming
      </div>

      <!-- Title -->
      <h1>
        <span class="white">JamZia</span><span class="warm">™</span>
      </h1>

      <!-- Subtitle -->
      <p class="subtitle">The Everything App</p>

      <!-- Description -->
      <p class="description">
        One platform. Infinite possibilities.<br>
        Entertainment, education, commerce, and connection — unified.
      </p>

      <!-- CTA -->
      <a href="landing.html" class="cta-button">
        Enter Experience
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14"></path>
          <path d="m12 5 7 7-7 7"></path>
        </svg>
      </a>

      <!-- Stats -->
      <div class="stats">
        <div class="stat">
          <div class="stat-value">11+</div>
          <div class="stat-label">Platforms</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <div class="stat-value">100M+</div>
          <div class="stat-label">Songs</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <div class="stat-value">10K+</div>
          <div class="stat-label">Movies</div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <div class="footer-content">
        <span>© 2026 JamZia™</span>
        <div class="status">
          <span class="status-dot"></span>
          All systems operational
        </div>
        <span>Ad9x Holdings, LLC</span>
      </div>
    </div>
  </main>
</body>
</html>
